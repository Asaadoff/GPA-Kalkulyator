<!DOCTYPE html>
<html lang="az">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÜOMG Kalkulyatoru</title>
  <meta name="description" content="Universitet tələbələri üçün çəkili ortalama hesablayıcı">
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --bg-base: #09090f;
      --bg-surface: #111118;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.065);
      --bg-glass: rgba(255, 255, 255, 0.055);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(139, 92, 246, 0.55);
      --border-error: rgba(239, 68, 68, 0.6);

      --accent-1: #8b5cf6;
      --accent-2: #6366f1;
      --accent-3: #a78bfa;
      --accent-glow: rgba(139, 92, 246, 0.25);
      --gradient-main: linear-gradient(135deg, #8b5cf6 0%, #6366f1 50%, #4f46e5 100%);
      --gradient-subtle: linear-gradient(135deg, rgba(139, 92, 246, 0.12) 0%, rgba(99, 102, 241, 0.06) 100%);

      --text-primary: #f1f0ff;
      --text-secondary: rgba(241, 240, 255, 0.55);
      --text-muted: rgba(241, 240, 255, 0.32);
      --text-error: #f87171;
      --text-success: #4ade80;
      --text-warning: #fbbf24;

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;

      --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255, 255, 255, 0.06) inset;
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.18), 0 8px 40px rgba(0, 0, 0, 0.45);
      --shadow-btn: 0 4px 20px rgba(139, 92, 246, 0.35);

      --font-display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-body: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;

      --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-spring: 380ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== BACKGROUND ===== */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-orbs::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 60vmax;
      height: 60vmax;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.09) 0%, transparent 70%);
      border-radius: 50%;
      animation: driftA 22s ease-in-out infinite alternate;
    }

    .bg-orbs::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 55vmax;
      height: 55vmax;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: driftB 28s ease-in-out infinite alternate;
    }

    @keyframes driftA {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(5%, 8%) scale(1.12);
      }
    }

    @keyframes driftB {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(-4%, -6%) scale(1.08);
      }
    }

    /* ===== LAYOUT ===== */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 56px 0 52px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.22);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-3);
      margin-bottom: 24px;
    }

    .header-badge span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-1);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #e0d9ff 0%, #a78bfa 40%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 420px;
      margin: 0 auto;
      font-weight: 400;
      line-height: 1.65;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 20px;
    }

    /* ===== SECTION LABEL ===== */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* ===== TABLE HEADER ===== */
    .table-header {
      display: grid;
      grid-template-columns: 1fr 110px 90px 40px;
      gap: 10px;
      padding: 0 6px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .table-header span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .table-header span:nth-child(2),
    .table-header span:nth-child(3) {
      text-align: center;
    }

    /* ===== COURSE ROWS ===== */
    #courses-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .course-row {
      display: grid;
      grid-template-columns: 1fr 110px 90px 40px;
      gap: 10px;
      align-items: start;
      animation: rowIn 260ms cubic-bezier(0.34, 1.26, 0.64, 1) both;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .course-row.removing {
      animation: rowOut 220ms ease-in both;
    }

    @keyframes rowOut {
      from {
        opacity: 1;
        transform: scale(1);
      }

      to {
        opacity: 0;
        transform: scale(0.95) translateX(8px);
      }
    }

    /* ===== INPUT GROUP ===== */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="number"] {
      text-align: center;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      border-color: var(--border-focus);
      background: rgba(139, 92, 246, 0.07);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
    }

    input.error {
      border-color: var(--border-error);
      background: rgba(239, 68, 68, 0.06);
    }

    input::-webkit-inner-spin-button,
    input::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .error-msg {
      font-size: 10.5px;
      color: var(--text-error);
      font-weight: 500;
      padding-left: 2px;
      line-height: 1.4;
      min-height: 15px;
      display: block;
    }

    /* ===== REMOVE BUTTON ===== */
    .btn-remove {
      width: 36px;
      height: 38px;
      background: rgba(239, 68, 68, 0.07);
      border: 1px solid rgba(239, 68, 68, 0.14);
      border-radius: var(--radius-sm);
      color: rgba(239, 68, 68, 0.55);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
      margin-top: 0;
    }

    .btn-remove:hover {
      background: rgba(239, 68, 68, 0.14);
      border-color: rgba(239, 68, 68, 0.32);
      color: #f87171;
      transform: scale(1.06);
    }

    .btn-remove:active {
      transform: scale(0.96);
    }

    .btn-remove svg {
      width: 14px;
      height: 14px;
    }

    /* ===== ACTION BUTTONS ===== */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 20px;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all var(--transition);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--gradient-main);
      color: #fff;
      box-shadow: var(--shadow-btn);
      flex: 1;
      justify-content: center;
      min-width: 160px;
    }

    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(139, 92, 246, 0.5);
      filter: brightness(1.08);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
    }

    .btn-add {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      color: var(--accent-3);
    }

    .btn-add:hover {
      background: rgba(139, 92, 246, 0.16);
      border-color: rgba(139, 92, 246, 0.35);
    }

    .btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* ===== RESULT CARD ===== */
    .result-card {
      background: var(--gradient-subtle);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-glow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 400ms cubic-bezier(0.34, 1.1, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .result-card.animate {
      animation: resultPop 420ms cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    @keyframes resultPop {
      0% {
        transform: scale(0.98);
        box-shadow: 0 0 0 rgba(139, 92, 246, 0);
      }

      60% {
        transform: scale(1.012);
        box-shadow: 0 0 50px rgba(139, 92, 246, 0.25);
      }

      100% {
        transform: scale(1);
      }
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .result-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-3);
    }

    .result-main {
      margin-bottom: 28px;
      text-align: center;
    }

    .result-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .result-avg {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #e0d9ff 0%, #c4b5fd 40%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 300ms ease;
    }

    .result-avg.empty {
      font-size: clamp(1.4rem, 4vw, 2rem);
      opacity: 0.45;
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.2;
      transition: all 250ms ease;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ===== COPY BTN IN RESULT ===== */
    .btn-copy {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
      font-size: 0.8rem;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      gap: 6px;
    }

    .btn-copy:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .btn-copy svg {
      width: 13px;
      height: 13px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 12px 0 4px;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
      font-style: italic;
    }

    /* ===== TOAST ===== */
    #toast-container {
      position: fixed;
      bottom: 28px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(20, 20, 32, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-md);
      padding: 12px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      animation: toastIn 300ms cubic-bezier(0.34, 1.3, 0.64, 1) both;
      pointer-events: auto;
      max-width: 300px;
    }

    .toast.fade-out {
      animation: toastOut 250ms ease-in both;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: scale(1);
      }

      to {
        opacity: 0;
        transform: scale(0.95) translateX(10px);
      }
    }

    .toast-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }

    .toast.success .toast-icon {
      color: #4ade80;
    }

    .toast.error .toast-icon {
      color: #f87171;
    }

    .toast.info .toast-icon {
      color: #818cf8;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 28px 0 8px;
      color: var(--text-muted);
      font-size: 0.82rem;
      letter-spacing: 0.02em;
    }

    footer strong {
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ===== DIVIDER ===== */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .wrapper {
        padding: 20px 14px 60px;
      }

      header {
        padding: 36px 0 36px;
      }

      .card,
      .result-card {
        padding: 22px 18px;
      }

      .table-header {
        display: none;
      }

      .course-row {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 8px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
      }

      .course-row .input-group:nth-child(1) {
        grid-column: 1/-1;
      }

      .course-row .input-group:nth-child(4) {
        grid-column: 1;
        align-self: start;
      }

      .course-row .btn-remove {
        grid-column: 2;
        justify-self: end;
      }

      #courses-container {
        gap: 10px;
      }

      .table-header-mobile {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 0 0 8px;
      }

      .actions {
        flex-direction: column;
      }

      .btn-primary {
        min-width: unset;
      }

      .result-stats {
        grid-template-columns: 1fr 1fr;
      }

      .result-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (min-width: 601px) {
      .table-header-mobile {
        display: none;
      }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <div class="bg-orbs" aria-hidden="true"></div>

  <div id="toast-container" role="region" aria-live="polite" aria-label="Bildirişlər"></div>

  <div class="wrapper">

    <!-- HEADER -->
    <header>
      <div class="header-badge" aria-hidden="true">
        <span></span> GPA Kalkulyatoru
      </div>
      <h1>ÜOMG Kalkulyatoru</h1>
      <p class="subtitle">Fənni və krediti daxil et və ÜOMG-ni hesabla!</p>
    </header>

    <!-- COURSES CARD -->
    <main>
      <div class="card" role="region" aria-label="Kurslar">
        <p class="section-label">Kurslar</p>

        <div class="table-header" role="row" aria-hidden="true">
          <span>Fənn adı</span>
          <span>Qiymət</span>
          <span>Kredit</span>
          <span></span>
        </div>

        <!-- Mobile labels (shown per-row on mobile via CSS) -->
        <div id="courses-container" role="list" aria-label="Kurslar siyahısı"></div>

        <div class="actions">
          <button class="btn btn-add" id="btn-add" onclick="addCourse()" aria-label="Yeni fənn əlavə et">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Fənn Əlavə Et
          </button>
          <button class="btn btn-primary" id="btn-calc" onclick="calculate()" aria-label="Ortalama hesabla">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            Hesabla
          </button>
          <button class="btn btn-secondary" id="btn-reset" onclick="resetAll()" aria-label="Sıfırla">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 .49-4" />
            </svg>
            Sıfırla
          </button>
        </div>
      </div>

      <!-- RESULT CARD -->
      <div class="result-card" id="result-card" role="region" aria-label="Nəticə" aria-live="polite">
        <div class="result-header">
          <span class="result-title">Nəticə</span>
          <button class="btn btn-copy" id="btn-copy" onclick="copyResult()" aria-label="Nəticəni kopyala"
            style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            Kopyala
          </button>
        </div>

        <div class="result-main">
          <p class="result-label">Çəkili Ortalama</p>
          <div class="result-avg empty" id="result-avg" aria-atomic="true">Hələ hesablanmayıb</div>
        </div>

        <div class="result-stats">
          <div class="stat-box">
            <div class="stat-value" id="stat-credits">—</div>
            <div class="stat-label">Ümumi Kredit</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="stat-count">—</div>
            <div class="stat-label">Fənn Sayı</div>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <p>Created by <strong>Umid Asadoff</strong></p>
    </footer>
  </div>

  <script>
    /* ===== STATE ===== */
    let courseIdCounter = 0;
    let lastResult = null;

    /* ===== INIT ===== */
    function init() {
      const saved = loadFromStorage();
      if (saved && saved.length > 0) {
        saved.forEach(c => addCourse(c.name, c.grade, c.credit));
      } else {
        addCourse();
        addCourse();
      }
      calculate();
    }

    /* ===== LOCAL STORAGE ===== */
    function saveToStorage() {
      try {
        const rows = getAllRows();
        const data = rows.map(row => ({
          name: row.nameInput.value.trim(),
          grade: row.gradeInput.value.trim(),
          credit: row.creditInput.value.trim(),
        }));
        localStorage.setItem('uomg_courses', JSON.stringify(data));
      } catch (e) { /* storage unavailable */ }
    }

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem('uomg_courses');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) { return null; }
    }

    function clearStorage() {
      try { localStorage.removeItem('uomg_courses'); } catch (e) { }
    }

    /* ===== GET ALL ROWS ===== */
    function getAllRows() {
      const container = document.getElementById('courses-container');
      return Array.from(container.querySelectorAll('.course-row')).map(row => ({
        el: row,
        nameInput: row.querySelector('.input-name'),
        gradeInput: row.querySelector('.input-grade'),
        creditInput: row.querySelector('.input-credit'),
        gradeError: row.querySelector('.grade-error'),
        creditError: row.querySelector('.credit-error'),
      }));
    }

    /* ===== ADD COURSE ===== */
    function addCourse(nameVal = '', gradeVal = '', creditVal = '') {
      const container = document.getElementById('courses-container');
      const id = ++courseIdCounter;

      const row = document.createElement('div');
      row.className = 'course-row';
      row.setAttribute('role', 'listitem');
      row.setAttribute('data-id', id);
      row.setAttribute('aria-label', 'Fənn ' + id);
      row.innerHTML = `
      <div class="input-group">
        <label for="name-${id}" class="sr-only">Fənn adı</label>
        <input
          class="input-name"
          id="name-${id}"
          type="text"
          placeholder="Fənn adı (istəyə görə)"
          maxlength="80"
          autocomplete="off"
          spellcheck="false"
          value="${escHtml(nameVal)}"
          aria-label="Fənn adı"
        />
      </div>
      <div class="input-group">
        <label for="grade-${id}" class="sr-only">Qiymət</label>
        <input
          class="input-grade"
          id="grade-${id}"
          type="number"
          inputmode="decimal"
          placeholder="Qiymət"
          min="0" max="100" step="0.01"
          value="${escHtml(gradeVal)}"
          aria-label="Qiymət"
          aria-describedby="grade-err-${id}"
        />
        <span class="error-msg grade-error" id="grade-err-${id}" role="alert" aria-live="polite"></span>
      </div>
      <div class="input-group">
        <label for="credit-${id}" class="sr-only">Kredit</label>
        <input
          class="input-credit"
          id="credit-${id}"
          type="number"
          inputmode="decimal"
          placeholder="Kredit"
          min="0" max="30" step="1"
          value="${escHtml(creditVal)}"
          aria-label="Kredit"
          aria-describedby="credit-err-${id}"
        />
        <span class="error-msg credit-error" id="credit-err-${id}" role="alert" aria-live="polite"></span>
      </div>
      <button
        class="btn-remove"
        onclick="removeCourse(this)"
        aria-label="Fənni sil"
        title="Sil"
        type="button"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    `;

      container.appendChild(row);

      /* wire events */
      const gradeInp = row.querySelector('.input-grade');
      const creditInp = row.querySelector('.input-credit');
      const nameInp = row.querySelector('.input-name');

      gradeInp.addEventListener('input', () => { sanitizeNumberInput(gradeInp, 0, 100); autoCalculate(); });
      gradeInp.addEventListener('blur', () => { validateGrade(gradeInp, row.querySelector('.grade-error')); });
      creditInp.addEventListener('input', () => { sanitizeNumberInput(creditInp, 0, 30); autoCalculate(); });
      creditInp.addEventListener('blur', () => { validateCredit(creditInp, row.querySelector('.credit-error')); });
      nameInp.addEventListener('input', autoCalculate);

      autoCalculate();
      return row;
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* ===== REMOVE COURSE ===== */
    function removeCourse(btn) {
      const container = document.getElementById('courses-container');
      const row = btn.closest('.course-row');
      const allRows = container.querySelectorAll('.course-row');

      if (allRows.length <= 1) {
        /* clear this row instead of removing */
        row.querySelector('.input-name').value = '';
        row.querySelector('.input-grade').value = '';
        row.querySelector('.input-credit').value = '';
        clearRowErrors(row);
        autoCalculate();
        return;
      }

      row.classList.add('removing');
      row.addEventListener('animationend', () => {
        row.remove();
        if (container.querySelectorAll('.course-row').length === 0) {
          addCourse();
        }
        autoCalculate();
      }, { once: true });
    }

    function clearRowErrors(row) {
      const gradeErr = row.querySelector('.grade-error');
      const creditErr = row.querySelector('.credit-error');
      const gradeInp = row.querySelector('.input-grade');
      const creditInp = row.querySelector('.input-credit');
      if (gradeErr) gradeErr.textContent = '';
      if (creditErr) creditErr.textContent = '';
      if (gradeInp) gradeInp.classList.remove('error');
      if (creditInp) creditInp.classList.remove('error');
    }

    /* ===== SANITIZE INPUTS ===== */
    function sanitizeNumberInput(input, min, max) {
      let val = input.value;
      /* remove non-numeric except dot/comma */
      val = val.replace(/[^0-9.,]/g, '').replace(',', '.');
      /* only one decimal point */
      const parts = val.split('.');
      if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
      input.value = val;
    }

    /* ===== VALIDATION ===== */
    function validateGrade(input, errEl) {
      const raw = input.value.trim();
      if (raw === '') { setError(input, errEl, ''); return true; } /* optional */
      const v = parseFloat(raw);
      if (isNaN(v)) { setError(input, errEl, 'Rəqəm daxil edin'); return false; }
      if (v < 0) { setError(input, errEl, '0-dan kiçik ola bilməz'); return false; }
      if (v > 100) { setError(input, errEl, 'Maksimum 100'); return false; }
      setError(input, errEl, '');
      return true;
    }

    function validateCredit(input, errEl) {
      const raw = input.value.trim();
      if (raw === '') { setError(input, errEl, ''); return true; }
      const v = parseFloat(raw);
      if (isNaN(v)) { setError(input, errEl, 'Rəqəm daxil edin'); return false; }
      if (v < 0) { setError(input, errEl, '0-dan kiçik ola bilməz'); return false; }
      if (v === 0) { setError(input, errEl, 'Kredit 0 ola bilməz'); return false; }
      if (v > 30) { setError(input, errEl, 'Maksimum 30'); return false; }
      if (!Number.isInteger(v)) { setError(input, errEl, 'Tam ədəd daxil edin'); return false; }
      setError(input, errEl, '');
      return true;
    }

    function setError(input, errEl, msg) {
      if (!errEl) return;
      errEl.textContent = msg;
      if (msg) { input.classList.add('error'); }
      else { input.classList.remove('error'); }
    }

    /* ===== CALCULATE ===== */
    function calculate() {
      const rows = getAllRows();
      let totalWeightedGrade = 0;
      let totalCredits = 0;
      let validCount = 0;
      let hasErrors = false;

      rows.forEach(row => {
        const gradeRaw = row.gradeInput.value.trim();
        const creditRaw = row.creditInput.value.trim();

        /* skip empty rows */
        if (gradeRaw === '' && creditRaw === '') return;

        /* validate inline */
        const gradeOk = validateGrade(row.gradeInput, row.gradeError);
        const creditOk = validateCredit(row.creditInput, row.creditError);

        if (!gradeOk || !creditOk) { hasErrors = true; return; }
        if (gradeRaw === '' || creditRaw === '') return; /* partially filled → ignore */

        const grade = parseFloat(gradeRaw);
        const credit = parseFloat(creditRaw);

        if (isNaN(grade) || isNaN(credit) || credit <= 0) return;

        totalWeightedGrade += grade * credit;
        totalCredits += credit;
        validCount++;
      });

      /* update UI */
      const avgEl = document.getElementById('result-avg');
      const creditsEl = document.getElementById('stat-credits');
      const countEl = document.getElementById('stat-count');
      const copyBtn = document.getElementById('btn-copy');
      const card = document.getElementById('result-card');

      if (validCount === 0) {
        avgEl.textContent = 'Məlumat daxil edin';
        avgEl.className = 'result-avg empty';
        creditsEl.textContent = '—';
        countEl.textContent = '—';
        copyBtn.style.display = 'none';
        lastResult = null;
        saveToStorage();
        return;
      }

      if (totalCredits === 0) {
        avgEl.textContent = 'Kredit sıfırdır';
        avgEl.className = 'result-avg empty';
        creditsEl.textContent = '0';
        countEl.textContent = validCount;
        copyBtn.style.display = 'none';
        lastResult = null;
        saveToStorage();
        return;
      }

      const avg = totalWeightedGrade / totalCredits;
      const avgFormatted = avg.toFixed(2);

      avgEl.textContent = avgFormatted;
      avgEl.className = 'result-avg';
      creditsEl.textContent = totalCredits;
      countEl.textContent = validCount;
      copyBtn.style.display = '';

      lastResult = { avg: avgFormatted, credits: totalCredits, count: validCount };

      /* trigger animation */
      card.classList.remove('animate');
      void card.offsetWidth;
      card.classList.add('animate');
      card.addEventListener('animationend', () => card.classList.remove('animate'), { once: true });

      saveToStorage();
    }

    /* debounced auto-calculate */
    let calcTimer = null;
    function autoCalculate() {
      clearTimeout(calcTimer);
      calcTimer = setTimeout(calculate, 200);
    }

    /* ===== RESET ===== */
    function resetAll() {
      const container = document.getElementById('courses-container');
      container.innerHTML = '';
      courseIdCounter = 0;
      lastResult = null;
      clearStorage();
      addCourse();
      addCourse();

      const avgEl = document.getElementById('result-avg');
      avgEl.textContent = 'Hələ hesablanmayıb';
      avgEl.className = 'result-avg empty';
      document.getElementById('stat-credits').textContent = '—';
      document.getElementById('stat-count').textContent = '—';
      document.getElementById('btn-copy').style.display = 'none';

      showToast('Sıfırlandı', 'info');
    }

    /* ===== COPY RESULT ===== */
    function copyResult() {
      if (!lastResult) return;
      const text =
        `ÜOMG Kalkulyatoru Nəticəsi\n` +
        `Çəkili Ortalama: ${lastResult.avg}\n` +
        `Ümumi Kredit:    ${lastResult.credits}\n` +
        `Fənn Sayı:       ${lastResult.count}`;
      navigator.clipboard.writeText(text)
        .then(() => showToast('Nəticə kopyalandı!', 'success'))
        .catch(() => {
          /* fallback */
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showToast('Nəticə kopyalandı!', 'success');
        });
    }

    /* ===== TOAST ===== */
    function showToast(msg, type = 'info') {
      const icons = {
        success: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`,
        error: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
        info: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
      };
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = icons[type] + `<span>${escHtml(msg)}</span>`;
      toast.setAttribute('role', 'status');
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('fade-out');
        toast.addEventListener('animationend', () => toast.remove(), { once: true });
      }, 2600);
    }

    /* ===== SR-ONLY STYLE ===== */
    const style = document.createElement('style');
    style.textContent = `.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}`;
    document.head.appendChild(style);

    /* ===== START ===== */
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
